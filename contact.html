  <style>
    /* Dock 中 a 标签样式与 button 保持一致 */
    .dock a {
      border: 0;
      background: transparent;
      min-width: 74px;
      height: 44px;
      padding: 0 13px;
      border-radius: 13px;
      color: #71808d;
      font: 600 12px inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      cursor: pointer;
      text-decoration: none;
      transition: .25s;
    }
    .dock a svg {
      width: 17px;
      height: 17px;
      flex: none;
    }
    .dock a.active {
      color: #fff;
      background: #263b55;
      box-shadow: 0 5px 12px rgba(38, 59, 85, .23);
    }
    .dock a:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, .75);
    }
    .dock a.active:hover {
      background: #263b55;
    }
    @media (max-width: 760px) {
      .dock a {
        min-width: 0;
        flex: 1;
        padding: 0 7px;
        font-size: 11px;
      }
    }
  </style>
